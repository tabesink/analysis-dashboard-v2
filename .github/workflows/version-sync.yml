name: Version Sync

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  verify-version-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate version metadata sync
        run: python3 scripts/check_version_sync.py
