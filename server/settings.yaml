# RSP Data Analytics Dashboard API - Configuration
# Copy to settings.yaml and modify as needed

# Runtime mode for non-container runs.
# Environment variables are the source of truth for deployments; this file is a
# readable local-development template.
app_env: "development"

# Server settings
host: "127.0.0.1"
port: 8000
debug: true
log_level: "INFO"

# Security (override via environment variables for real deployments)
admin_secret: "admin123"
jwt_secret: "dev-jwt-secret-change-me"
jwt_algorithm: "HS256"
jwt_expiry_hours: 24
auth_cookie_name: "rsp_auth"
auth_cookie_secure: false
auth_cookie_samesite: "lax"
allow_insecure_cookies: false
cors_origins:
  - "http://localhost:3001"
  - "http://127.0.0.1:3001"

# Storage paths
data_root: "data"
log_dir: "logs"

# LTTB downsampling settings
lttb_resolution: 5000
lttb_inflection_eps: 0.000001
lttb_point_budget: 100
# If enabled via helper path, computes target_points = original_points * lttb_reduction_factor
lttb_reduction_factor: 0.4

# Query limits
max_upload_size_mb: 61440
max_events_per_query: 500

# Performance monitoring
enable_performance_metrics: true

# Rate limiting
rate_limiting:
  enabled: true
  default_requests_per_minute: 120
  upload_requests_per_minute: 10
  render_requests_per_minute: 20
  admin_requests_per_minute: 30
  burst_allowance: 10

# Caching
caching:
  enabled: true
  filter_options_ttl_seconds: 3600
  program_ids_ttl_seconds: 60
  versions_ttl_seconds: 60
  events_ttl_seconds: 30

# Data validation
validation:
  max_nan_percentage: 5.0
  min_rows: 10
  max_rows: 1000000
  check_timestamp_monotonicity: true

# NOTE: Filter options are now defined in schema.yaml alongside column definitions.
# This provides a single source of truth for both database schema and UI filter config.
# See schema.yaml dim_event table for filter column definitions.

